<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI·OKR 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #fff; --border: #e2e8f0;
      --text: #0f172a; --text-secondary: #64748b; --text-muted: #94a3b8;
      --primary: #2563eb; --primary-light: #eff6ff; --purple: #7c3aed;
      --sidebar-bg: #0f172a; --sidebar-text: #cbd5e1; --radius: 10px; --radius-sm: 6px;
    }
    body { font-family: Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); min-height: 100vh; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    select, input, textarea { font-family: inherit; font-size: 13px; }
    input[type=text], input[type=number], textarea, select {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text); width: 100%;
    }
    input:disabled { background: var(--bg); color: var(--text-muted); }
    textarea { resize: vertical; min-height: 60px; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; min-width: 240px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; padding: 24px 0; }
    .sidebar-header { padding: 0 20px 24px; border-bottom: 1px solid #1e293b; }
    .sidebar-header h1 { font-size: 15px; font-weight: 600; color: #f1f5f9; }
    .sidebar-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section-label { font-size: 11px; font-weight: 600; color: #475569; padding: 12px 12px 6px; }
    .nav-item { display: block; width: 100%; text-align: left; padding: 9px 12px; border-radius: var(--radius-sm); font-size: 13px; color: var(--sidebar-text); }
    .nav-item:hover { background: #1e293b; color: #f1f5f9; }
    .nav-item.active { background: var(--primary); color: #fff; font-weight: 500; }
    .nav-item.parent { font-weight: 500; }
    .nav-item-input { margin-bottom: 4px; }
    .sidebar-footer { padding: 16px 20px 0; border-top: 1px solid #1e293b; font-size: 11px; color: #475569; display: flex; flex-direction: column; gap: 2px; }
    .sync-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; padding: 4px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }
    .sync-badge.synced { background: #05966922; color: #34d399; }
    .sync-badge.loading { background: #2563eb22; color: #60a5fa; }
    .sync-badge.error { background: #dc262622; color: #f87171; }
    .sync-badge.offline { background: #47556933; color: #94a3b8; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 16px; flex-wrap: wrap; }
    .header-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius); overflow-x: auto; max-width: 100%; }
    .header-tab { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }
    .header-tab:hover { color: var(--text); }
    .header-tab.active { background: var(--surface); color: var(--primary); }
    .header-controls { display: flex; gap: 16px; align-items: center; }
    .control-group { display: flex; align-items: center; gap: 8px; }
    .control-group label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px 40px; }
    .view-header { display: flex; justify-content: space-between; margin-bottom: 24px; }
    .view-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .view-header p { font-size: 13px; color: var(--text-secondary); }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; gap: 16px; }
    .summary-card-clickable { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .summary-card-clickable:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(37,99,235,0.12); }
    .alert-item-clickable { cursor: pointer; transition: background 0.15s; }
    .alert-item-clickable:hover { background: #eff6ff; }
    .nav-highlight { animation: nav-highlight-pulse 2.5s ease; }
    @keyframes nav-highlight-pulse { 0%,100% { background: transparent; } 15%,85% { background: #fef9c3; } }
    tr.nav-highlight td { background: #fef9c3 !important; }
    .okr-card.nav-highlight { box-shadow: 0 0 0 2px #facc15; background: #fffbeb; }
    .excel-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .excel-note { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .summary-icon { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .summary-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .summary-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    .summary-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .overview-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; align-items: stretch; }
    .overview-panel { display: flex; flex-direction: column; min-height: 380px; }
    .overview-panel-body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .overview-chart-wrap { flex: 1; position: relative; min-height: 240px; }
    .overview-chart-wrap canvas { width: 100% !important; height: 100% !important; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .panel h2, .panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .panel-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; min-height: 18px; line-height: 1.5; }
    .chart-legend { display: flex; gap: 20px; justify-content: center; margin-top: 8px; font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
    .chart-legend span { display: flex; align-items: center; gap: 6px; }
    .chart-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }
    .dept-status-list { flex: 1; display: flex; flex-direction: column; gap: 0; height: 100%; }
    .dept-status-item { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0; margin: 0; border-bottom: 1px solid var(--border); }
    .dept-status-item:last-child { border-bottom: none; }
    .dept-status-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .dept-name { font-size: 13px; font-weight: 600; }
    .dept-scores { font-size: 12px; color: var(--text-muted); }
    .dept-bars { display: flex; flex-direction: column; gap: 4px; }
    .dept-bar-row { display: grid; grid-template-columns: 32px 1fr; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }
    .progress-bar-wrap { display: flex; align-items: center; gap: 8px; width: 100%; }
    .progress-bar-track { flex: 1; background: #f1f5f9; border-radius: 100px; overflow: hidden; height: 8px; }
    .progress-bar-fill { border-radius: 100px; height: 100%; transition: width 0.4s; }
    .progress-bar-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 36px; text-align: right; }
    .status-badge { display: inline-flex; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; border: 1px solid; white-space: nowrap; }
    .alert-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .alert-item { display: flex; gap: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .alert-item strong { display: block; font-size: 13px; margin-bottom: 2px; }
    .alert-item .meta { font-size: 12px; color: var(--text-muted); }
    .kpi-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
    .dept-kpi-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); }
    td { padding: 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }
    .kpi-name-cell strong { display: block; font-weight: 500; margin-bottom: 2px; }
    .kpi-name-cell span { font-size: 12px; color: var(--text-muted); }
    .icon-btn { padding: 6px; border-radius: var(--radius-sm); color: var(--text-muted); }
    .icon-btn:hover { background: var(--bg); color: var(--primary); }
    .edit-input { width: 80px; padding: 4px 8px; border: 1px solid var(--primary); border-radius: var(--radius-sm); }
    .okr-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }
    .okr-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .okr-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .okr-dept-tag { font-size: 11px; font-weight: 600; color: var(--purple); background: #f5f3ff; padding: 4px 10px; border-radius: 100px; }
    .okr-progress-ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid #ede9fe; border-top-color: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--purple); }
    .okr-objective { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; }
    .kr-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .kr-item { padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .kr-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .kr-title { font-size: 13px; font-weight: 500; }
    .kr-progress-pct { font-size: 12px; font-weight: 700; color: var(--purple); }
    .kr-metrics { display: flex; align-items: center; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
    .okr-footer { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .input-mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .input-mode-tab { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); border: 1px solid var(--border); background: var(--surface); }
    .input-mode-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .input-layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .btn-primary, .btn-secondary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-text { font-size: 12px; color: var(--primary); font-weight: 500; }
    .form-message { padding: 10px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
    .form-message.success { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .form-message.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .kr-form-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .kr-form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .kr-form-row { display: grid; grid-template-columns: 36px 1fr 72px 72px 56px 32px; gap: 8px; align-items: center; margin-bottom: 8px; }
    .kr-index { font-size: 11px; font-weight: 700; color: var(--purple); text-align: center; }
    .input-list-items { display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow-y: auto; }
    .input-list-item { display: flex; justify-content: space-between; gap: 12px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .input-list-item strong { display: block; font-size: 13px; margin: 4px 0 2px; }
    .list-item-tag { font-size: 10px; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 2px 8px; border-radius: 100px; }
    .list-item-meta { font-size: 11px; color: var(--text-muted); }
    .list-item-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .list-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 24px; }
    .standalone-note { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; padding: 10px 16px; border-radius: var(--radius-sm); font-size: 12px; margin-bottom: 16px; }
    .org-structure-panel { margin-bottom: 16px; }
    .org-tree { margin-top: 8px; }
    .org-tree-root { margin-bottom: 12px; }
    .org-node { display: inline-block; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; background: var(--bg); border: 1px solid var(--border); }
    .org-node-parent { background: var(--primary-light); border-color: #bfdbfe; color: var(--primary); font-weight: 600; }
    .org-tree-children { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; padding-left: 24px; border-left: 2px solid var(--border); margin-left: 8px; }
    .org-tree-flat { padding-left: 0; border-left: none; margin-left: 0; }
    .org-tree-item .org-node { width: 100%; }
    .input-layout-wide { grid-template-columns: 1fr; }
    .objectives-section { margin-top: 20px; }
    .objective-block { margin-bottom: 16px; padding: 16px; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .objective-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .obj-index { font-size: 12px; font-weight: 700; color: var(--purple); }
    .form-grid.compact { margin-top: 12px; }
    .kr-form-row-extended { display: grid; grid-template-columns: 36px 1fr auto 32px; gap: 8px; align-items: start; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed var(--border); }
    .kr-form-row-extended .kr-note-input { grid-column: 2 / -1; min-height: 36px; font-size: 12px; }
    .kr-rate-field { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .kr-fixed-target { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .kr-unit-suffix { font-size: 12px; color: var(--text-secondary); }
    .kpi-edit-fields { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
    .kpi-type-cell { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .progress-na { font-size: 12px; color: var(--text-muted); }
    .okr-progress-section { margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
    .okr-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .progress-note-text { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; }
    .progress-note-empty { font-size: 12px; color: var(--text-muted); font-style: italic; }
    .progress-edit-fields { display: flex; flex-direction: column; gap: 10px; }
    .progress-edit-fields label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .kr-edit-fields { margin-top: 10px; }
    .kr-metrics-row { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
    .kr-target-label { font-size: 12px; color: var(--text-muted); padding-bottom: 6px; }
    .kr-note { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
    .kr-edit-btn, .action-btns button { padding: 6px; border-radius: var(--radius-sm); color: var(--text-muted); }
    .kr-edit-btn:hover, .action-btns button:hover { background: var(--bg); color: var(--primary); }
    .action-btns { display: flex; gap: 4px; }
    .action-btns.inline { margin-left: auto; }
    .edit-input.small { width: 64px; }
    .nav-loading-bar { height: 2px; background: var(--primary); opacity: 0.6; animation: nav-load 0.8s ease infinite; display: none; }
    @keyframes nav-load { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    .content-pending { opacity: 0.85; pointer-events: none; }
    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
    .auth-screen[hidden] { display: none !important; }
    .auth-card { width: 100%; max-width: 420px; background: var(--surface); border-radius: 14px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.35); }
    .auth-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .auth-card .auth-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.5; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .auth-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .auth-actions .btn-primary { width: 100%; justify-content: center; padding: 11px; }
    .auth-link { font-size: 12px; color: var(--primary); text-align: center; margin-top: 12px; display: block; }
    .auth-link:hover { text-decoration: underline; }
    .user-info { padding: 10px 12px; margin: 8px 12px 0; background: #1e293b; border-radius: var(--radius-sm); font-size: 11px; }
    .user-info strong { display: block; color: #f1f5f9; font-size: 12px; margin-bottom: 2px; }
    .user-info span { color: #94a3b8; }
    .role-badge { display: inline-block; margin-top: 4px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 600; }
    .role-badge.admin { background: #7c3aed33; color: #c4b5fd; }
    .role-badge.member { background: #2563eb22; color: #93c5fd; }
    .nav-item-logout { color: #f87171 !important; margin-top: 4px; }
    .nav-item-logout:hover { background: #450a0a !important; color: #fecaca !important; }
    .users-table-wrap { overflow-x: auto; }
    .status-active { color: #059669; font-weight: 600; }
    .status-suspended { color: #dc2626; font-weight: 600; }
    #app-root[hidden] { display: none !important; }
    @media (max-width: 1200px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .overview-panels, .input-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; min-width: unset; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
      .nav-section-label { width: 100%; }
      .sidebar-footer { display: none; }
      .okr-cards { grid-template-columns: 1fr; }
      .kpi-table-wrap { overflow-x: auto; }
      .kr-form-row { grid-template-columns: 1fr; gap: 6px; padding: 12px; background: var(--bg); border-radius: var(--radius-sm); }
      .kr-form-row-extended { grid-template-columns: 1fr; }
      .kr-form-row-extended .kr-note-input { grid-column: 1; }
    }
  </style>
</head>
<body>
  <div id="auth-screen" class="auth-screen"></div>
  <div class="app" id="app-root" hidden>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <header class="header-bar" id="header"></header>
      <div class="nav-loading-bar" id="nav-loading" aria-hidden="true"></div>
      <div class="content" id="content"></div>
    </main>
  </div>
  <script>
(function () {
  const STORAGE_KEY = 'innovation-office-dashboard-html';
  const LOCAL_BACKUP_KEY = 'innovation-office-dashboard-backup';

  let supabaseClient = null;
  let authUser = null;
  let userProfile = null;
  let authView = 'login'; // login | forgot | reset | bootstrap
  let authMsg = null;
  let needsBootstrap = false;
  let allProfiles = [];
  let syncStatus = 'loading'; // loading | synced | error | offline
  let syncErrorMsg = '';

  const KR_TARGET_PERCENT = 100;

  function normalizeKr(kr) {
    let achievement = kr.actual;
    if (kr.progressRate != null && !Number.isNaN(kr.progressRate)) {
      achievement = kr.progressRate;
    } else if (kr.target !== KR_TARGET_PERCENT && kr.target > 0) {
      achievement = Math.round((kr.actual / kr.target) * 100);
    }
    return {
      ...kr,
      target: KR_TARGET_PERCENT,
      unit: '%',
      actual: achievement,
      progressNote: kr.progressNote ?? '',
      progressRate: null,
    };
  }

  function migrateState(raw) {
    if (!raw || typeof raw !== 'object') return null;
    if (!Array.isArray(raw.kpis) || !Array.isArray(raw.okrs)) return null;
    return {
      kpis: raw.kpis.filter(k => k.departmentId !== 'innovation-office').map(normalizeKpi),
      okrs: raw.okrs
        .filter(o => o.departmentId !== 'innovation-office')
        .map(o => ({
        ...o,
        progressNote: o.progressNote ?? '',
        progressRate: o.progressRate ?? null,
        keyResults: (o.keyResults ?? []).map(normalizeKr),
      })),
    };
  }

  function getInitialData() {
    return migrateState(JSON.parse(JSON.stringify(INITIAL_DATA)));
  }

  function loadLocalData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LOCAL_BACKUP_KEY);
      if (raw) {
        const migrated = migrateState(JSON.parse(raw));
        if (migrated) {
          if (migrated.kpis.length === 0 && migrated.okrs.length === 0) return getInitialData();
          return migrated;
        }
      }
    } catch (e) {}
    return getInitialData();
  }

  function saveLocalBackup() {

    } catch (e) {
      console.error('[Dashboard] 로컬 백업 실패', e);
    }
  }

  function initSupabase() {
    const cfg = window.SUPABASE_CONFIG;
    if (!cfg || !cfg.url || !cfg.anonKey) return false;
    if (cfg.url.includes('YOUR_') || cfg.anonKey.includes('YOUR_')) return false;
    if (typeof supabase === 'undefined' || !supabase.createClient) return false;
    supabaseClient = supabase.createClient(cfg.url, cfg.anonKey, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
    });
    return true;
  }

  function isAdmin() { return userProfile?.role === 'admin'; }

  function profileFromRow(row) {
    if (!row) return null;
    return {
      id: row.id,
      email: row.email,
      displayName: row.display_name || '',
      role: row.role,
      status: row.status,
      createdAt: row.created_at,
      updatedAt: row.updated_at,
    };
  }

  function showApp(show) {
    const app = document.getElementById('app-root');
    const auth = document.getElementById('auth-screen');
    if (app) app.hidden = !show;
    if (auth) auth.hidden = show;

  function authErrorText(err) {
    const msg = err?.message || String(err || '오류');
    if (msg.includes('Invalid login credentials')) return '이메일 또는 비밀번호가 올바르지 않습니다.';
    if (msg.includes('Email not confirmed')) return '이메일 인증이 필요합니다. Supabase에서 이메일 확인을 끄거나 메일을 확인하세요.';
    return msg;
  }

  async function loadProfile(userId) {
    const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', userId).maybeSingle();
    if (error) throw error;
    return profileFromRow(data);
  }

  async function checkNeedsBootstrap() {
    const { data, error } = await supabaseClient.rpc('needs_bootstrap');
    if (error) return false;
    return !!data;
  }

  async function fetchAllProfiles() {
    if (!isAdmin()) return [];
    const { data, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    return (data || []).map(profileFromRow);
  }

  async function handleLogin(e) {
    e.preventDefault();
    authMsg = null;
    const email = document.getElementById('login-email')?.value.trim();
    const password = document.getElementById('login-password')?.value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) { authMsg = { type: 'error', text: authErrorText(error) }; renderAuthScreen(); }
  }

  async function handleForgot(e) {
    e.preventDefault();
    authMsg = null;
    const email = document.getElementById('forgot-email')?.value.trim();
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href.split('#')[0],
    });
    if (error) { authMsg = { type: 'error', text: authErrorText(error) }; }
    else { authMsg = { type: 'success', text: '비밀번호 재설정 메일을 보냈습니다. 메일함을 확인해 주세요.' }; }
    renderAuthScreen();
  }

  async function handleBootstrap(e) {
    e.preventDefault();
    authMsg = null;
    const displayName = document.getElementById('bootstrap-name')?.value.trim();
    const email = document.getElementById('bootstrap-email')?.value.trim();
    const password = document.getElementById('bootstrap-password')?.value;
    const { error } = await supabaseClient.auth.signUp({
      email, password,
      options: { data: { display_name: displayName } },
    });
    if (error) { authMsg = { type: 'error', text: authErrorText(error) }; renderAuthScreen(); return; }
    await new Promise(r => setTimeout(r, 600));
    const { error: rpcErr } = await supabaseClient.rpc('promote_first_admin');
    if (rpcErr) { authMsg = { type: 'error', text: authErrorText(rpcErr) }; renderAuthScreen(); return; }
    needsBootstrap = false;
    authMsg = { type: 'success', text: '관리자 계정이 생성되었습니다. 로그인 중…' };
    renderAuthScreen();
  }

    if ((p1 || '').length < 6) { authMsg = { type: 'error', text: '비밀번호는 6자 이상이어야 합니다.' }; renderAuthScreen(); return; }
    const { error } = await supabaseClient.auth.updateUser({ password: p1 });
    if (error) { authMsg = { type: 'error', text: authErrorText(error) }; renderAuthScreen(); return; }
    authView = 'login';
    authMsg = { type: 'success', text: '비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요.' };
    await supabaseClient.auth.signOut();
    renderAuthScreen();
  }

  async function handleLogout() {
    teardownRealtime();
    await supabaseClient.auth.signOut();
    authUser = null;
    userProfile = null;
    authView = 'login';
    authMsg = null;
    showApp(false);
    renderAuthScreen();
  }

  function teardownRealtime() {
    if (realtimeChannel && supabaseClient) {
      supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
  }

  async function onAuthSession(session, event) {
    if (event === 'PASSWORD_RECOVERY') {
      authView = 'reset';
      showApp(false);
      renderAuthScreen();
      return;
    }
    if (session?.user) {
      try {
        let profile = await loadProfile(session.user.id);
        if (!profile) {
          await new Promise(r => setTimeout(r, 400));
          profile = await loadProfile(session.user.id);
        }
        if (profile?.status === 'suspended') {
          await supabaseClient.auth.signOut();
          authUser = null;
          userProfile = null;
          authView = 'login';
          authMsg = { type: 'error', text: '정지된 계정입니다. 관리자에게 문의하세요.' };
          showApp(false);
          renderAuthScreen();
          return;
        }
        authUser = session.user;
        userProfile = profile;
        if (isAdmin()) allProfiles = await fetchAllProfiles();
        showApp(true);
        await bootstrap();
        requestRender();
      } catch (err) {
        console.error(err);
        authMsg = { type: 'error', text: '프로필 로드 실패: ' + authErrorText(err) };
        showApp(false);
        renderAuthScreen();
      }
    } else {
      authUser = null;
      userProfile = null;
      allProfiles = [];
      teardownRealtime();
      try { needsBootstrap = await checkNeedsBootstrap(); } catch (e) { needsBootstrap = false; }
      authView = needsBootstrap ? 'bootstrap' : 'login';
      showApp(false);
      renderAuthScreen();
    }
  }

  async function initAuth() {
    renderAuthScreen();
    if (!initSupabase()) {
      authView = 'offline';
      renderAuthScreen();
      return;
    }
    supabaseClient.auth.onAuthStateChange((event, session) => {
      onAuthSession(session, event);
    });
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      needsBootstrap = await checkNeedsBootstrap();
      authView = needsBootstrap ? 'bootstrap' : 'login';
      showApp(false);
      renderAuthScreen();
    }
  }

  async function loadFromSupabase() {
    const [kpiRes, okrRes] = await Promise.all([
      supabaseClient.from('kpis').select('*'),
      supabaseClient.from('okrs').select('*'),
    ]);
    if (kpiRes.error) throw kpiRes.error;
    if (okrRes.error) throw okrRes.error;
    return migrateState({
      kpis: (kpiRes.data || []).map(kpiFromRow),
      okrs: (okrRes.data || []).map(o => ({
        ...okrFromRow(o),
        keyResults: (o.key_results || []).map(normalizeKr),
      })),
    });
  }

  async function saveToSupabase() {
    if (!supabaseClient) return;
    isSaving = true;
    setSyncStatus('loading');
    try {
      const kpiRows = data.kpis.map(kpiToRow);
      const okrRows = data.okrs.map(okrToRow);
      const kpiIds = data.kpis.map(k => k.id);
      const okrIds = data.okrs.map(o => o.id);

      if (kpiRows.length) {
        const { error } = await supabaseClient.from('kpis').upsert(kpiRows, { onConflict: 'id' });
        if (error) throw error;
      }
      if (okrRows.length) {
        const { error } = await supabaseClient.from('okrs').upsert(okrRows, { onConflict: 'id' });
        if (error) throw error;
      }

      const { data: dbKpis } = await supabaseClient.from('kpis').select('id');
      const { data: dbOkrs } = await supabaseClient.from('okrs').select('id');
      const kpiToDelete = (dbKpis || []).map(r => r.id).filter(id => !kpiIds.includes(id));
      const okrToDelete = (dbOkrs || []).map(r => r.id).filter(id => !okrIds.includes(id));
      if (kpiToDelete.length) {
        const { error } = await supabaseClient.from('kpis').delete().in('id', kpiToDelete);
        if (error) throw error;
      }
      if (okrToDelete.length) {
        const { error } = await supabaseClient.from('okrs').delete().in('id', okrToDelete);
        if (error) throw error;
      }
    } finally {
      isSaving = false;
    }
  }

  function syncBadgeHtml() {
    const labels = { loading: '동기화 중…', synced: 'Supabase 연결됨', error: '동기화 오류', offline: '오프라인 (로컬)' };
    const title = syncStatus === 'error' && syncErrorMsg ? ` title="${esc(syncErrorMsg)}"` : '';
    return `<span class="sync-badge ${syncStatus}"${title}><span class="sync-dot"></span>${labels[syncStatus] || syncStatus}</span>`;
  }

  function setSyncStatus(status) {

    const el = document.querySelector('.sync-badge');
    if (el) el.outerHTML = syncBadgeHtml();

  function setupRealtime() {
    if (!supabaseClient || realtimeChannel) return;
    realtimeChannel = supabaseClient
      .channel('dashboard-sync')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'kpis' }, scheduleRemoteReload)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'okrs' }, scheduleRemoteReload)
      .subscribe();
  }

  function scheduleRemoteReload() {
    if (isSaving) return;
    clearTimeout(reloadTimer);
    reloadTimer = setTimeout(async () => {
      try {
        const remote = await loadFromSupabase();
        if (remote) {
          data = remote;
          saveLocalBackup();
          setSyncStatus('synced');
          requestRender();
        }
      } catch (e) {
        console.error('[Dashboard] 원격 새로고침 실패', e);
      }
    }, 600);
  }

  function saveData() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      saveLocalBackup();
      if (!supabaseClient) return;
      try {
        await saveToSupabase();
        setSyncStatus('synced');
        syncErrorMsg = '';
      } catch (e) {
        console.error('[Dashboard] Supabase 저장 실패', e);
        syncStatus = 'error';
        syncErrorMsg = e.message || '저장 실패';
        setSyncStatus('error');
      }
    }, 400);
  }

  async function bootstrap() {
    if (!supabaseClient || !authUser) return;
    syncStatus = 'loading';
    requestRender();

    try {
      const remote = await loadFromSupabase();
      if (remote && (remote.kpis.length || remote.okrs.length)) {
        data = remote;
      } else {
        const local = loadLocalData();
        data = (local.kpis.length || local.okrs.length) ? local : getInitialData();
        await saveToSupabase();
      }
      saveLocalBackup();
      syncStatus = 'synced';
      setupRealtime();
    } catch (e) {
      console.error('[Dashboard] Supabase 로드 실패', e);
      syncStatus = 'error';
      syncErrorMsg = e.message || '연결 실패';
      data = loadLocalData();
    }
    requestRender();
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function dept(id) { return DEPARTMENTS.find(d => d.id === id); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function uid() {
    try {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
    } catch (e) {}
    return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
  }

  function calcProgress(actual, target) {
    if (!target) return 0;
    return Math.min(Math.round((actual / target) * 100), 150);
  }

  const KPI_VALUE_TYPE_LABELS = { number: '숫자', percent: '비율(%)', text: '텍스트' };

  function getKpiValueType(k) {
    if (k.valueType) return k.valueType;
    if (k.unit === '%') return 'percent';
    return 'number';
  }

  function parseNumericKpiValue(value) {
    if (typeof value === 'number') return Number.isNaN(value) ? null : value;
    const trimmed = String(value ?? '').trim();
    if (!trimmed) return null;
    const n = parseFloat(trimmed);
    return Number.isNaN(n) ? null : n;
  }

  function formatKpiValue(k, field) {
    const val = k[field];
    const type = getKpiValueType(k);
    if (type === 'text') return String(val ?? '');
    if (type === 'percent') return `${val}%`;
    return `${val}${k.unit || ''}`;
  }

  function buildKpiFieldValues(valueType, targetStr, actualStr, unit) {
    if (valueType === 'text') {
      if (!String(targetStr).trim()) return { error: '목표(텍스트)를 입력해 주세요.' };
      return { target: String(targetStr).trim(), actual: String(actualStr).trim(), unit: '' };
    }
    const target = parseFloat(targetStr);
    if (Number.isNaN(target)) {
      return { error: valueType === 'percent' ? '목표 비율을 숫자로 입력해 주세요.' : '목표값을 숫자로 입력해 주세요.' };
    }
    const actual = parseFloat(actualStr);
    return { target, actual: Number.isNaN(actual) ? 0 : actual, unit: valueType === 'percent' ? '%' : String(unit || '').trim() };
  }

  function normalizeKpi(kpi) {
    const valueType = getKpiValueType(kpi);
    if (valueType === 'text') {
      return { ...kpi, valueType, target: String(kpi.target ?? ''), actual: String(kpi.actual ?? ''), unit: '', progressRate: kpi.progressRate ?? null };
    }
    return {
      ...kpi,
      valueType,
      target: parseNumericKpiValue(kpi.target) ?? 0,
      actual: parseNumericKpiValue(kpi.actual) ?? 0,
      unit: valueType === 'percent' ? '%' : (kpi.unit ?? ''),
      progressRate: kpi.progressRate ?? null,
    };
  }

  function calcKpiProgress(k) {
    if (k.progressRate != null && typeof k.progressRate === 'number' && !Number.isNaN(k.progressRate)) {
      return Math.min(Math.max(Math.round(k.progressRate), 0), 150);
    }
    const type = getKpiValueType(k);
    if (type === 'text') return 0;
    const target = parseNumericKpiValue(k.target);
    const actual = parseNumericKpiValue(k.actual);
    if (target === null || actual === null) return 0;
    return calcProgress(actual, target);
  }

  function calcKrProgress(kr) {
    if (kr.unit === '%' && kr.target === KR_TARGET_PERCENT) {
      return Math.min(Math.max(Math.round(kr.actual), 0), 150);
    }
    if (kr.progressRate != null && typeof kr.progressRate === 'number' && !Number.isNaN(kr.progressRate)) {
      return Math.min(Math.max(Math.round(kr.progressRate), 0), 150);
    }
    return calcProgress(kr.actual, kr.target);
  }

  function calcOkrProgress(o) {
    if (o.progressRate != null && typeof o.progressRate === 'number' && !Number.isNaN(o.progressRate)) {
      return Math.min(Math.max(Math.round(o.progressRate), 0), 150);
    }
    if (!o.keyResults.length) return 0;
    return Math.round(o.keyResults.reduce((s, kr) => s + calcKrProgress(kr), 0) / o.keyResults.length);
  }

  function calcWeightedKpiScore(kpis) {
    const tw = kpis.reduce((s, k) => s + k.weight, 0);
    if (!tw) return 0;
    return Math.round(kpis.reduce((s, k) => s + calcKpiProgress(k) * k.weight, 0) / tw);
  }

  function calcAvgOkrProgress(okrs) {
    if (!okrs.length) return 0;
    return Math.round(okrs.reduce((s, o) => s + calcOkrProgress(o), 0) / okrs.length);
  }

  function progressBar(value, color) {
    const v = Math.min(Math.max(value, 0), 100);
    return `<div class="progress-bar-wrap"><div class="progress-bar-track"><div class="progress-bar-fill" style="width:${v}%;background:${color}"></div></div><span class="progress-bar-label">${value}%</span></div>`;
  }

  function renderOverview() {

    const atRiskKpis = kpis.filter(k => k.status === 'at-risk' || k.status === 'behind');
    const atRiskOkrs = okrs.filter(o => calcOkrProgress(o) < 70);

    return `

        <div class="summary-card summary-card-clickable" data-nav-tab="kpi" data-nav-kpi-filter="completed" role="button" tabindex="0"><div class="summary-icon" style="color:#059669;background:#05966912">✓</div><div><p class="summary-label">KPI 달성 완료</p><p class="summary-value">${completed}</p><p class="summary-sub">전체 ${kpis.length}개 중</p></div></div>
        <div class="summary-card summary-card-clickable" data-nav-scroll="overview-alerts" role="button" tabindex="0"><div class="summary-icon" style="color:#d97706;background:#d9770612">!</div><div><p class="summary-label">주의 필요 항목</p><p class="summary-value">${atRiskKpis.length + atRiskOkrs.length}</p><p class="summary-sub">KPI ${atRiskKpis.length} · OKR ${atRiskOkrs.length}</p></div></div>
      </div>
      <div class="overview-panels">
        <section class="panel overview-panel">
          <h2>부서별 달성률 비교</h2>
          <p class="panel-desc">${YEAR}년 KPI(가중 평균) vs ${ui.quarter} OKR(평균 진행률)</p>
          <div class="overview-panel-body">
            <div class="overview-chart-wrap"><canvas id="dept-chart"></canvas></div>
            <div class="chart-legend"><span><i style="background:#2563eb"></i> 연간 KPI</span><span><i style="background:#7c3aed"></i> 분기 OKR</span></div>
          </div>
        </section>
        <section class="panel overview-panel">
          <h2>부서별 현황</h2>
          <p class="panel-desc">${YEAR}년 ${ui.quarter} KPI·OKR 부서별 진행률</p>
          <div class="overview-panel-body dept-status-list">
          ${deptIds.map(id => {
            const d = dept(id);
            const dk = data.kpis.filter(k => k.year === YEAR && k.departmentId === id);
            const do_ = data.okrs.filter(o => o.year === YEAR && o.quarter === ui.quarter && o.departmentId === id);
            const ks = calcWeightedKpiScore(dk), os = calcAvgOkrProgress(do_);
            return `<div class="dept-status-item"><div class="dept-status-header"><span class="dept-name">${esc(d.name)}</span><span class="dept-scores">KPI ${ks}% · OKR ${os}%</span></div>
              <div class="dept-bars"><div class="dept-bar-row"><span>KPI</span>${progressBar(ks, '#2563eb')}</div><div class="dept-bar-row"><span>OKR</span>${progressBar(os, '#7c3aed')}</div></div></div>`;
          }).join('')}
          </div>
        </section>
      </div>
      ${renderOrgStructure()}
      ${(atRiskKpis.length || atRiskOkrs.length) ? `<section class="panel" id="overview-alerts"><h2>주의 필요 항목</h2><div class="alert-list">
        ${atRiskKpis.map(k => `<div class="alert-item alert-item-clickable" data-nav-kpi-id="${k.id}" data-nav-dept="${k.departmentId}" role="button" tabindex="0">${statusBadge(k.status)}<div><strong>${esc(k.name)}</strong><div class="meta">${esc(dept(k.departmentId)?.shortName)} · KPI · ${calcKpiProgress(k)}% 달성</div></div></div>`).join('')}
        ${atRiskOkrs.map(o => `<div class="alert-item alert-item-clickable" data-nav-okr-id="${o.id}" data-nav-dept="${o.departmentId}" role="button" tabindex="0"><span class="status-badge" style="color:#d97706;background:#d9770614;border-color:#d9770633">주의</span><div><strong>${esc(o.objective)}</strong><div class="meta">${esc(dept(o.departmentId)?.shortName)} · OKR · ${calcOkrProgress(o)}% 진행</div></div></div>`).join('')}
      </div></section>` : ''}`;
  }

  function renderKpi() {
    let kpis = filterKpis();
    if (ui.kpiStatusFilter === 'completed') kpis = kpis.filter(k => k.status === 'completed');
    const grouped = {};
    kpis.forEach(k => { (grouped[k.departmentId] = grouped[k.departmentId] || []).push(k); });
    const filterNote = ui.kpiStatusFilter === 'completed'
      ? `<div class="standalone-note">달성 완료 KPI만 표시 중입니다. <button type="button" class="btn-text" data-clear-kpi-filter>전체 KPI 보기</button></div>`
      : '';
    return `${filterNote}<div class="view-header"><div><h2>연간 핵심관리지표 (KPI)</h2><p>${YEAR}년 연간 목표 · 분기별 실적 업데이트</p></div></div>
      ${Object.entries(grouped).map(([deptId, list]) => `
        <section class="dept-kpi-section"><h3>${esc(dept(deptId)?.name)}</h3>
        <div class="kpi-table-wrap"><table><thead><tr><th>지표명</th><th>유형</th><th>목표</th><th>실적</th><th>달성률</th><th>가중치</th><th>상태</th><th>담당</th><th></th></tr></thead><tbody>
        ${list.map(k => {
          const p = calcKpiProgress(k);
          const editing = ui.kpiEditId === k.id;
          const type = getKpiValueType(k);
          const typeLabel = type === 'number' ? '숫자' : type === 'percent' ? '비율' : '텍스트';
          const actualEdit = editing
            ? (type === 'text'
              ? `<div class="kpi-edit-fields"><input class="edit-input" type="text" id="kpi-edit-input" value="${esc(ui.kpiEditVal)}"><input class="edit-input" type="number" step="any" min="0" max="150" id="kpi-edit-progress" placeholder="달성률 %" value="${esc(ui.kpiEditProgressRate)}"></div>`
              : `<input class="edit-input" type="number" step="any" id="kpi-edit-input" value="${esc(ui.kpiEditVal)}">`)
            : esc(formatKpiValue(k, 'actual'));
          const progressCell = (type === 'text' && k.progressRate == null && !editing)
            ? '<span class="progress-na">—</span>'
            : progressBar(p, '#2563eb');
          const hl = ui.navHighlight?.type === 'kpi' && ui.navHighlight.id === k.id ? ' nav-highlight' : '';
          return `<tr id="kpi-row-${k.id}" class="${hl.trim()}"><td class="kpi-name-cell"><strong>${esc(k.name)}</strong><span>${esc(k.description)}</span></td>
            <td class="kpi-type-cell">${typeLabel}</td>
            <td>${esc(formatKpiValue(k, 'target'))}</td>
            <td>${actualEdit}</td>
            <td>${progressCell}</td><td>${k.weight}%</td><td>${statusBadge(k.status)}</td><td>${esc(k.owner)}</td>
            <td>${editing ? `<button class="icon-btn" data-kpi-save="${k.id}">✓</button><button class="icon-btn" data-kpi-cancel>✕</button>` : `<button class="icon-btn" data-kpi-edit="${k.id}">✎</button>`}</td></tr>`;
        }).join('')}
        </tbody></table></div></section>`).join('')}`;
  }

  function renderOkr() {
    const okrs = filterOkrs();
    if (!okrs.length) {
      return `<div class="view-header"><div><h2>분기 OKR</h2><p>${YEAR}년 ${ui.quarter} 목표</p></div></div>
        <div class="empty-state"><p>선택한 분기에 등록된 OKR이 없습니다.</p><p>데이터 입력 탭에서 Objective와 Key Result를 등록하세요.</p></div>`;
    }
    return `<div class="view-header"><div><h2>분기 OKR</h2><p>${YEAR}년 ${ui.quarter} · KR 목표 100% 고정 · 달성율(%) 입력</p></div><div class="view-meta">${okrs.length}개 Objective</div></div>
      <div class="okr-cards">${okrs.map(o => {
        const p = calcOkrProgress(o);
        const isOkrEditing = ui.okrProgressEdit && ui.okrProgressEdit.okrId === o.id;
        const hl = ui.navHighlight?.type === 'okr' && ui.navHighlight.id === o.id ? ' nav-highlight' : '';
        return `<article id="okr-card-${o.id}" class="okr-card${hl}"><div class="okr-card-header"><span class="okr-dept-tag">${esc(dept(o.departmentId)?.shortName)}</span><div class="okr-progress-ring">${p}%</div></div>
          <h3 class="okr-objective">${esc(o.objective)}</h3><div style="margin-bottom:16px">${progressBar(p, '#7c3aed').replace('8px','6px')}</div>
          <div class="okr-progress-section">
            <div class="okr-progress-header">
              <span class="section-label">Objective 진행현황</span>
              ${isOkrEditing ? `<div class="action-btns inline"><button type="button" class="icon-btn" data-okr-progress-save="${o.id}">✓</button><button type="button" class="icon-btn" data-okr-progress-cancel>✕</button></div>`
                : `<button type="button" class="kr-edit-btn" data-okr-progress-edit="${o.id}">✎</button>`}
            </div>
            ${isOkrEditing ? `<div class="progress-edit-fields">
              <label>달성률 (%)<input type="number" class="edit-input" placeholder="비우면 KR 평균" id="okr-progress-rate" value="${esc(ui.okrProgressEdit.progressRate)}"></label>
              <label>진행현황 (텍스트)<textarea rows="2" id="okr-progress-note" placeholder="이번 분기 Objective 진행 상황을 기술하세요">${esc(ui.okrProgressEdit.progressNote)}</textarea></label>
            </div>` : `<div class="progress-display">${o.progressNote ? `<p class="progress-note-text">${esc(o.progressNote)}</p>` : `<p class="progress-note-empty">진행현황 미입력</p>`}</div>`}
          </div>
          <ul class="kr-list">${o.keyResults.map(kr => {
            const kp = calcKrProgress(kr);
            const isEditing = ui.krEdit && ui.krEdit.okrId === o.id && ui.krEdit.krId === kr.id;
            return `<li class="kr-item"><div class="kr-header"><span class="kr-title">${esc(kr.title)}</span><span class="kr-progress-pct">${kp}%</span></div>
              <div class="progress-bar-wrap"><div class="progress-bar-track" style="height:4px"><div class="progress-bar-fill" style="width:${Math.min(kp,100)}%;background:#7c3aed;height:4px"></div></div></div>
              ${isEditing ? `<div class="progress-edit-fields kr-edit-fields">
                <div class="kr-metrics-row">
                  <span class="kr-target-label">목표: ${KR_TARGET_PERCENT}%</span>
                  <label>달성율 (%)<input type="number" step="any" min="0" max="150" class="edit-input small" id="kr-edit-rate" value="${esc(ui.krEdit.achievementRate)}"></label>
                </div>
                <label>진행현황 (텍스트)<textarea rows="2" id="kr-edit-note" placeholder="KR별 진행 상황">${esc(ui.krEdit.progressNote)}</textarea></label>
                <div class="action-btns"><button type="button" class="icon-btn" data-kr-save="${o.id}:${kr.id}">✓</button><button type="button" class="icon-btn" data-kr-cancel>✕</button></div>
              </div>` : `<div class="kr-metrics"><span>목표: <strong>${KR_TARGET_PERCENT}%</strong></span><span>달성율: <strong>${kp}%</strong></span>
                <button type="button" class="kr-edit-btn" data-kr-edit="${o.id}:${kr.id}">✎</button></div>
                ${kr.progressNote ? `<p class="progress-note-text kr-note">${esc(kr.progressNote)}</p>` : ''}`}
            </li>`;
          }).join('')}</ul>
          <footer class="okr-footer"><span>담당: ${esc(o.owner)}</span><span>최종 업데이트: ${o.updatedAt}</span></footer></article>`;
      }).join('')}</div>`;
  }

  function renderKpiFormFields(kpiForm) {
    const vt = kpiForm.valueType || 'number';
    const typeSelect = `<div class="form-field"><label>목표·실적 유형</label><select name="valueType">${Object.entries(KPI_VALUE_TYPE_LABELS).map(([k, label]) => `<option value="${k}" ${vt === k ? 'selected' : ''}>${label}</option>`).join('')}</select></div>`;
    if (vt === 'text') {
      return typeSelect + `
        <div class="form-field full"><label>연간 목표 (텍스트) *</label><input name="target" value="${esc(kpiForm.target)}" placeholder="예: A등급 달성"></div>
        <div class="form-field full"><label>현재 실적 (텍스트)</label><input name="actual" value="${esc(kpiForm.actual)}" placeholder="예: B등급 진행 중"></div>
        <div class="form-field"><label>달성률 (%)</label><input name="progressRate" type="number" step="any" min="0" max="150" value="${esc(kpiForm.progressRate)}" placeholder="텍스트 지표용"></div>`;
    }
    const unitField = vt === 'number'
      ? `<div class="form-field"><label>단위</label><input name="unit" value="${esc(kpiForm.unit)}" placeholder="건, 명, 점 등"></div>`
      : '';
    const targetLabel = vt === 'percent' ? '연간 목표 (%) *' : '연간 목표 *';
    const actualLabel = vt === 'percent' ? '현재 실적 (%)' : '현재 실적';
    return typeSelect + `
      <div class="form-field"><label>${targetLabel}</label><input name="target" type="number" step="any" value="${esc(kpiForm.target)}"></div>
      <div class="form-field"><label>${actualLabel}</label><input name="actual" type="number" step="any" value="${esc(kpiForm.actual)}"></div>
      ${unitField}`;
  }

  function readKpiFormFromDom() {
    const form = document.getElementById('kpi-form');
    if (!form) return ui.kpiForm || defaultKpiForm();
    const fd = new FormData(form);
    return {
      departmentId: fd.get('departmentId') || defaultKpiForm().departmentId,
      name: (fd.get('name') || '').toString(),
      description: (fd.get('description') || '').toString(),
      valueType: (fd.get('valueType') || 'number').toString(),
      target: (fd.get('target') || '').toString(),
      actual: (fd.get('actual') || '').toString(),
      unit: (fd.get('unit') || '').toString(),
      progressRate: (fd.get('progressRate') || '').toString(),
      weight: (fd.get('weight') || '').toString(),
      owner: (fd.get('owner') || '').toString(),
      status: (fd.get('status') || 'on-track').toString(),
    };
  }

  function renderInput() {
    const kpis = filterKpis();
    const okrs = data.okrs.filter(o => o.year === YEAR && (ui.department === 'all' || o.departmentId === ui.department));
    const kpiForm = ui.kpiForm || defaultKpiForm();

    if (ui.inputMode === 'kpi') {
      return `<div class="view-header"><div><h2>데이터 입력</h2><p>연간 KPI와 분기 OKR을 등록·수정합니다</p></div></div>
        ${ui.message ? `<div class="form-message ${ui.message.type}">${esc(ui.message.text)}</div>` : ''}
        <div class="input-mode-tabs">
          <button type="button" class="input-mode-tab active" data-input-mode="kpi">연간 KPI ${ui.editingKpiId?'수정':'등록'}</button>
          <button type="button" class="input-mode-tab" data-input-mode="okr">분기 OKR 등록</button>
        </div>
        <div class="input-layout">
          <form class="panel input-form" id="kpi-form">
            <h3>${ui.editingKpiId ? 'KPI 수정' : '새 KPI 등록'}</h3>
            <div class="form-grid">
              <div class="form-field"><label>부서</label><select name="departmentId">${DEPARTMENTS.map(d=>`<option value="${d.id}" ${kpiForm.departmentId===d.id?'selected':''}>${esc(d.name)}</option>`).join('')}</select></div>
              <div class="form-field"><label>연도</label><input type="number" value="${YEAR}" disabled></div>
              <div class="form-field full"><label>지표명 *</label><input name="name" value="${esc(kpiForm.name)}" placeholder="예: 핵심인재 리텐션율"></div>
              <div class="form-field full"><label>설명</label><textarea name="description" rows="2">${esc(kpiForm.description)}</textarea></div>
              ${renderKpiFormFields(kpiForm)}
              <div class="form-field"><label>가중치 (%) *</label><input name="weight" type="number" step="any" value="${esc(kpiForm.weight)}"></div>
              <div class="form-field"><label>담당자</label><input name="owner" value="${esc(kpiForm.owner)}"></div>
              <div class="form-field"><label>상태</label><select name="status">${['on-track','at-risk','behind','completed'].map(s=>`<option value="${s}" ${kpiForm.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}</select></div>
            </div>
            <div class="form-actions"><button type="submit" class="btn-primary">${ui.editingKpiId?'수정 저장':'KPI 등록'}</button>${ui.editingKpiId?'<button type="button" class="btn-secondary" data-kpi-reset>취소</button>':''}</div>
          </form>
          <section class="panel input-list"><h3>등록된 KPI (${kpis.length})</h3><div class="input-list-items">
            ${kpis.length ? kpis.map(k=>`<div class="input-list-item"><div><span class="list-item-tag">${esc(dept(k.departmentId)?.shortName)}</span><strong>${esc(k.name)}</strong><div class="list-item-meta">목표 ${esc(formatKpiValue(k, 'target'))} · 가중치 ${k.weight}%</div></div>
              <div class="list-item-actions"><button type="button" class="icon-btn" data-load-kpi="${k.id}">✎</button><button type="button" class="icon-btn" data-del-kpi="${k.id}">🗑</button></div></div>`).join('') : '<p class="list-empty">등록된 KPI가 없습니다.</p>'}
          </div></section>
        </div>`;
    }

    const okrMeta = ui.okrMeta || defaultOkrMeta();
    const objectiveDrafts = ui.objectiveDrafts.length ? ui.objectiveDrafts : [newObjectiveDraft()];
    const validCount = objectiveDrafts.filter(o => o.objective.trim()).length;

    return `<div class="view-header"><div><h2>데이터 입력</h2><p>연간 KPI와 분기 OKR(Objective · KR)을 등록·수정합니다</p></div></div>
      ${ui.message ? `<div class="form-message ${ui.message.type}">${esc(ui.message.text)}</div>` : ''}
      <div class="input-mode-tabs">
        <button type="button" class="input-mode-tab" data-input-mode="kpi">연간 KPI 등록</button>
        <button type="button" class="input-mode-tab active" data-input-mode="okr">분기 OKR ${ui.editingOkrId?'수정':'등록'}</button>
      </div>
      <div class="input-layout input-layout-wide">
        <form class="panel input-form" id="okr-form">
          <h3>${ui.editingOkrId ? 'OKR 수정' : '새 OKR 등록'}</h3>
          <div class="form-grid">
            <div class="form-field"><label>부서</label><select name="departmentId">${DEPARTMENTS.map(d=>`<option value="${d.id}" ${okrMeta.departmentId===d.id?'selected':''}>${esc(d.name)}</option>`).join('')}</select></div>
            <div class="form-field"><label>연도</label><input type="number" value="${YEAR}" disabled></div>
            <div class="form-field"><label>분기 *</label><select name="quarter">${Object.keys(QUARTER_LABELS).map(q=>`<option value="${q}" ${okrMeta.quarter===q?'selected':''}>${QUARTER_LABELS[q]}</option>`).join('')}</select></div>
            <div class="form-field"><label>담당</label><input name="owner" value="${esc(okrMeta.owner)}" placeholder="팀명 또는 담당자"></div>
          </div>
          <div class="objectives-section">
            <div class="kr-form-header">
              <h4>Objectives</h4>
              ${!ui.editingOkrId ? `<button type="button" class="btn-text" data-add-objective>+ Objective 추가</button>` : ''}
            </div>
            ${objectiveDrafts.map((obj, objIndex) => `
              <div class="objective-block" data-obj-id="${obj.id}">
                <div class="objective-block-header">
                  <span class="obj-index">O${objIndex + 1}</span>
                  ${!ui.editingOkrId && objectiveDrafts.length > 1 ? `<button type="button" class="icon-btn" data-remove-objective="${obj.id}">🗑</button>` : ''}
                </div>
                <div class="form-field full"><label>Objective (목표) *</label>
                  <textarea data-obj-field="objective" rows="2" placeholder="이번 분기 달성하고자 하는 핵심 목표">${esc(obj.objective)}</textarea></div>
                <div class="form-grid compact">
                  <div class="form-field"><label>달성률 (%)</label>
                    <input type="number" data-obj-field="progressRate" value="${esc(obj.progressRate)}" placeholder="비우면 KR 평균"></div>
                  <div class="form-field full"><label>진행현황 (텍스트)</label>
                    <textarea data-obj-field="progressNote" rows="2" placeholder="Objective 진행 상황">${esc(obj.progressNote)}</textarea></div>
                </div>
                <div class="kr-form-section">
                  <div class="kr-form-header"><h4>Key Results</h4><button type="button" class="btn-text" data-add-kr="${obj.id}">+ KR 추가</button></div>
                  ${obj.keyResults.map((kr, krIndex) => `
                    <div class="kr-form-row-extended" data-kr-id="${kr.id}">
                      <span class="kr-index">KR${krIndex + 1}</span>
                      <input placeholder="핵심 결과" value="${esc(kr.title)}" data-kr-field="title">
                      <div class="kr-rate-field">
                        <span class="kr-fixed-target">목표 100%</span>
                        <input type="number" step="any" min="0" max="150" placeholder="달성율" value="${esc(kr.achievementRate)}" data-kr-field="achievementRate" title="달성율 (%)">
                        <span class="kr-unit-suffix">%</span>
                      </div>
                      <button type="button" class="icon-btn" data-remove-kr="${obj.id}:${kr.id}" ${obj.keyResults.length<=1?'disabled':''}>🗑</button>
                      <textarea class="kr-note-input" data-kr-field="progressNote" placeholder="KR 진행현황 (텍스트)" rows="1">${esc(kr.progressNote)}</textarea>
                    </div>`).join('')}
                </div>
              </div>`).join('')}
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">${ui.editingOkrId ? '수정 저장' : `OKR ${validCount || ''}건 등록`}</button>
            ${ui.editingOkrId ? '<button type="button" class="btn-secondary" data-okr-reset>취소</button>' : ''}
          </div>

    return { departmentId: ui.department !== 'all' ? ui.department : 'talent-management', name:'', description:'', valueType:'number', target:'', actual:'', unit:'', progressRate:'', weight:'', owner:'', status:'on-track' };

    return { departmentId: ui.department !== 'all' ? ui.department : 'talent-management', quarter: ui.quarter, owner: '' };

  function newKr() {
    return { id: uid(), title: '', achievementRate: '0', progressNote: '' };

  function krToDraft(kr) {
    return {
      id: kr.id,
      title: kr.title,
      achievementRate: String(calcKrProgress(kr)),
      progressNote: kr.progressNote ?? '',
    };
  }

  function newObjectiveDraft() {
    return { id: uid(), objective: '', progressNote: '', progressRate: '', keyResults: [newKr()] };
  }

  function parseRate(val) {
    const trimmed = String(val ?? '').trim();
    if (!trimmed) return null;
    const n = parseFloat(trimmed);
    return isNaN(n) ? null : n;
  }

  function buildKeyResults(drafts) {
    return drafts.filter(kr => kr.title.trim()).map(kr => ({
      id: kr.id,
      title: kr.title.trim(),
      target: KR_TARGET_PERCENT,
      actual: parseFloat(kr.achievementRate) || 0,
      unit: '%',
      progressNote: (kr.progressNote || '').trim(),
      progressRate: null,
    }));
  }

  function collectObjectiveDrafts() {
    const form = document.getElementById('okr-form');
    if (!form) return;
    const drafts = [];
    form.querySelectorAll('.objective-block').forEach(block => {
      const obj = {
        id: block.dataset.objId,
        objective: block.querySelector('[data-obj-field=objective]')?.value || '',
        progressNote: block.querySelector('[data-obj-field=progressNote]')?.value || '',
        progressRate: block.querySelector('[data-obj-field=progressRate]')?.value || '',
        keyResults: [],
      };
      block.querySelectorAll('.kr-form-row-extended').forEach(row => {
        obj.keyResults.push({
          id: row.dataset.krId,
          title: row.querySelector('[data-kr-field=title]')?.value || '',
          achievementRate: row.querySelector('[data-kr-field=achievementRate]')?.value || '0',
          progressNote: row.querySelector('[data-kr-field=progressNote]')?.value || '',
        });
      });
      drafts.push(obj);
    });
    if (drafts.length) ui.objectiveDrafts = drafts;
  }

  function collectOkrMeta() {
    const form = document.getElementById('okr-form');
    if (!form) return;
    ui.okrMeta = {
      departmentId: form.querySelector('[name=departmentId]')?.value,
      quarter: form.querySelector('[name=quarter]')?.value,
      owner: form.querySelector('[name=owner]')?.value || '',

  function handleKpiSubmit(e) {
    e.preventDefault();
    const kpiForm = document.getElementById('kpi-form');
    if (!kpiForm) return;
    const fd = new FormData(kpiForm);
    const name = (fd.get('name') || '').toString().trim();
    const valueType = (fd.get('valueType') || 'number').toString();
    const weight = parseFloat(fd.get('weight'));
    const progressRate = parseRate((fd.get('progressRate') || '').toString());
    if (!name) return showMsg('error', '지표명을 입력해 주세요.');
    if (isNaN(weight)) return showMsg('error', '가중치는 숫자로 입력해 주세요.');
    const built = buildKpiFieldValues(valueType, fd.get('target'), fd.get('actual'), fd.get('unit'));
    if (built.error) return showMsg('error', built.error);
    const payload = {
      departmentId: fd.get('departmentId'), year: YEAR, name, description: (fd.get('description') || '').toString().trim(),
      valueType, target: built.target, actual: built.actual, unit: built.unit, progressRate,
      weight, status: fd.get('status'), owner: (fd.get('owner') || '').toString().trim() || '담당자', updatedAt: today(),
    };
    if (ui.editingKpiId) {
      const k = data.kpis.find(x => x.id === ui.editingKpiId);
      Object.assign(k, payload);
      showMsg('success', 'KPI가 수정되었습니다.');
    } else {
      data.kpis.push({ id: uid(), ...payload });
      showMsg('success', 'KPI가 등록되었습니다.');
    }
    ui.editingKpiId = null; ui.kpiForm = null; saveData();
  }

  function handleOkrSubmit(e) {
    e.preventDefault();
    collectObjectiveDrafts();
    collectOkrMeta();
    const okrMeta = ui.okrMeta || defaultOkrMeta();
    const validObjectives = ui.objectiveDrafts.filter(o => o.objective.trim());
    if (!validObjectives.length) return showMsg('error', 'Objective를 최소 1개 이상 입력해 주세요.');
    for (const obj of validObjectives) {
      const krs = buildKeyResults(obj.keyResults);
      if (!krs.length) {
        const preview = obj.objective.slice(0, 20);
        return showMsg('error', `「${preview}${obj.objective.length > 20 ? '…' : ''}」에 Key Result를 최소 1개 입력해 주세요.`);
      }
    }
    const owner = (okrMeta.owner || '').trim() || dept(okrMeta.departmentId)?.name || '담당팀';
    if (ui.editingOkrId && validObjectives.length === 1) {
      const obj = validObjectives[0];
      const o = data.okrs.find(x => x.id === ui.editingOkrId);
      Object.assign(o, {
        departmentId: okrMeta.departmentId, year: YEAR, quarter: okrMeta.quarter,
        objective: obj.objective.trim(), keyResults: buildKeyResults(obj.keyResults), owner,
        progressNote: obj.progressNote.trim(), progressRate: parseRate(obj.progressRate), updatedAt: today(),
      });
      showMsg('success', 'OKR이 수정되었습니다.');
    } else {
      const newOkrs = validObjectives.map(obj => ({
        id: uid(),
        departmentId: okrMeta.departmentId, year: YEAR, quarter: okrMeta.quarter,
        objective: obj.objective.trim(), keyResults: buildKeyResults(obj.keyResults), owner,
        progressNote: obj.progressNote.trim(), progressRate: parseRate(obj.progressRate), updatedAt: today(),
      }));
      data.okrs.push(...newOkrs);
      showMsg('success', `OKR ${newOkrs.length}건이 등록되었습니다.`);
    }
    resetOkrForm(); saveData();
  }
