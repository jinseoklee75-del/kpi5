  async function importMembers(file) {
    if (!file || typeof XLSX === 'undefined') return showMsg('error', 'Excel 파일을 읽을 수 없습니다.');
    excelImporting = true;
    showMsg('success', 'Excel 업로드 처리 중…');
    requestRender();
    let success = 0;
    let fail = 0;
    const errors = [];
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      const { data: { session: adminSession } } = await supabaseClient.auth.getSession();
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const name = (row['이름'] || row.displayName || '').toString().trim();
        const email = (row['이메일'] || row.email || '').toString().trim().toLowerCase();
        const password = (row['임시비밀번호'] || row.password || '').toString();
        let role = (row['역할'] || row.role || 'member').toString().trim().toLowerCase();
        let status = (row['상태'] || row.status || 'active').toString().trim().toLowerCase();
        if (!email) { fail++; errors.push(`${i + 2}행: 이메일 없음`); continue; }
        const existing = allProfiles.find(p => p.email.toLowerCase() === email);
        if (existing) {
          const updates = { updated_at: new Date().toISOString() };
          if (name) updates.display_name = name;
          if (role === 'admin' || role === 'member') updates.role = role;
          if (status === 'active' || status === 'suspended') updates.status = status;
          const { error } = await supabaseClient.from('profiles').update(updates).eq('id', existing.id);
          if (error) { fail++; errors.push(`${email}: ${authErrorText(error)}`); }
          else success++;
        } else {
          if (!name) { fail++; errors.push(`${email}: 신규 회원은 이름 필수`); continue; }
          if (!password || password.length < 6) { fail++; errors.push(`${email}: 임시비밀번호 6자 이상 필수`); continue; }
          if (role !== 'admin' && role !== 'member') role = 'member';
          if (status !== 'active' && status !== 'suspended') status = 'active';
          const { data, error } = await supabaseClient.auth.signUp({
            email, password,
            options: { data: { display_name: name } },
          });
          if (error) { fail++; errors.push(`${email}: ${authErrorText(error)}`); continue; }
          if (adminSession) await supabaseClient.auth.setSession(adminSession);
          if (data.user) {
            const { error: uErr } = await supabaseClient.from('profiles').update({
              display_name: name, role, status, updated_at: new Date().toISOString(),
            }).eq('id', data.user.id);
            if (uErr) { fail++; errors.push(`${email}: ${authErrorText(uErr)}`); continue; }
          }
          success++;
        }
      }
      allProfiles = await fetchAllProfiles();
    } catch (err) {
      excelImporting = false;
      return showMsg('error', 'Excel 처리 실패: ' + (err.message || err));
    }
    excelImporting = false;
    const summary = `처리 완료: 성공 ${success}건, 실패 ${fail}건`;
    const detail = errors.length
      ? '\n' + errors.slice(0, 5).join('\n') + (errors.length > 5 ? `\n… 외 ${errors.length - 5}건` : '')
      : '';
    showMsg(fail && !success ? 'error' : fail ? 'error' : 'success', summary + detail);
    requestRender();
  }

  function renderChart() {
    if (ui.tab !== 'overview' || typeof Chart === 'undefined') return;
    const canvas = document.getElementById('dept-chart');
    if (!canvas) return;
    const deptIds = ui.department === 'all' ? DEPARTMENTS.map(d => d.id) : [ui.department];
    const labels = [], kpiData = [], okrData = [];
    deptIds.forEach(id => {
      const d = dept(id);
      labels.push(d.shortName);
      kpiData.push(calcWeightedKpiScore(data.kpis.filter(k => k.year === YEAR && k.departmentId === id)));
      okrData.push(calcAvgOkrProgress(data.okrs.filter(o => o.year === YEAR && o.quarter === ui.quarter && o.departmentId === id)));
    });
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: { labels, datasets: [
        { label: 'KPI 달성률', data: kpiData, backgroundColor: '#2563eb', borderRadius: 4, maxBarThickness: 40 },
        { label: 'OKR 진행률', data: okrData, backgroundColor: '#7c3aed', borderRadius: 4, maxBarThickness: 40 },
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } } }
    });
  }

  function initEvents() {
    document.body.addEventListener('click', (e) => {
      const authEl = e.target.closest('[data-auth-action]');
      if (authEl) {
        if (authEl.dataset.authAction === 'show-login') { authView = 'login'; authMsg = null; renderAuthScreen(); return; }
        if (authEl.dataset.authAction === 'show-forgot') { authView = 'forgot'; authMsg = null; renderAuthScreen(); return; }
        if (authEl.dataset.authAction === 'logout') { handleLogout(); return; }
      }
      const accountEl = e.target.closest('[data-account-save]');
      if (accountEl) {
        if (accountEl.dataset.accountSave === 'name') handleAccountNameSave();
        if (accountEl.dataset.accountSave === 'password') handleAccountPasswordSave();
        return;
      }
      if (e.target.closest('[data-user-status]')) {
        handleUserStatusToggle(e.target.closest('[data-user-status]').dataset.userStatus);
        return;
      }
      if (e.target.closest('[data-user-reset]')) {
        handleUserResetEmail(e.target.closest('[data-user-reset]').dataset.userReset);
        return;
      }
    });

    document.body.addEventListener('change', (e) => {
      if (e.target.dataset.userRole) {
        handleUserRoleChange(e.target.dataset.userRole, e.target.value);
      }
      if (e.target.id === 'excel-upload-input') {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (file) importMembers(file);
      }
    });

    document.body.addEventListener('submit', (e) => {
      if (e.target.id === 'login-form') { handleLogin(e); return; }
      if (e.target.id === 'forgot-form') { handleForgot(e); return; }
      if (e.target.id === 'bootstrap-form') { handleBootstrap(e); return; }
      if (e.target.id === 'reset-form') { handleResetPassword(e); return; }
      if (e.target.id === 'user-create-form') { handleCreateUser(e); return; }
    });

    const app = document.getElementById('app-root');
    if (!app) return;
    app.addEventListener('click', (e) => {
      const navEl = e.target.closest('[data-nav-tab],[data-nav-scroll],[data-nav-kpi-id],[data-nav-okr-id],[data-clear-kpi-filter],[data-excel-action]');
      if (navEl) {
        if (navEl.hasAttribute('data-clear-kpi-filter')) {
          ui.kpiStatusFilter = null;
          requestRender();
          return;
        }
        if (navEl.dataset.excelAction === 'template') { exportMemberTemplate(); return; }
        if (navEl.dataset.excelAction === 'export') { exportMembers(); return; }
        if (navEl.dataset.excelAction === 'upload') { document.getElementById('excel-upload-input')?.click(); return; }
        if (navEl.dataset.navScroll) {
          navigateToTarget({ scrollTo: navEl.dataset.navScroll });
          return;
        }
        if (navEl.dataset.navKpiId) {
          navigateToTarget({ tab: 'kpi', dept: navEl.dataset.navDept, kpiId: navEl.dataset.navKpiId });
          return;
        }
        if (navEl.dataset.navOkrId) {
          navigateToTarget({ tab: 'okr', dept: navEl.dataset.navDept, okrId: navEl.dataset.navOkrId });
          return;
        }
        if (navEl.dataset.navTab) {
          navigateToTarget({ tab: navEl.dataset.navTab, kpiFilter: navEl.dataset.navKpiFilter || null });
          return;
        }
      }

      const el = e.target.closest('[data-dept],[data-tab],[data-kpi-edit],[data-kpi-save],[data-kpi-cancel],[data-kr-edit],[data-kr-save],[data-kr-cancel],[data-okr-progress-edit],[data-okr-progress-save],[data-okr-progress-cancel],[data-input-mode],[data-kpi-reset],[data-load-kpi],[data-del-kpi],[data-load-okr],[data-del-okr],[data-okr-reset],[data-add-objective],[data-remove-objective],[data-add-kr],[data-remove-kr]');
      if (!el) return;

      if (el.dataset.tab || el.dataset.dept !== undefined) {
        if (el.dataset.tab) ui.tab = el.dataset.tab;
        if (el.dataset.dept !== undefined) ui.department = el.dataset.dept;
        if (!el.dataset.tab && (ui.tab === 'input' || ui.tab === 'users' || ui.tab === 'account')) {
          ui.tab = 'overview';
        }
        if (ui.tab === 'users' && isAdmin()) {
          fetchAllProfiles().then(p => { allProfiles = p; requestRender({ nav: true }); }).catch(() => requestRender({ nav: true }));
          return;
        }
        requestRender({ nav: true });
        return;
      }
      if (el.dataset.kpiEdit) {
        const k = data.kpis.find(x => x.id === el.dataset.kpiEdit);
        ui.kpiEditId = k.id;
        ui.kpiEditVal = String(k.actual);
        ui.kpiEditProgressRate = k.progressRate != null ? String(k.progressRate) : '';
        requestRender();
        setTimeout(() => document.getElementById('kpi-edit-input')?.focus(), 0);
        return;
      }
      if (el.dataset.kpiSave) {
        const k = data.kpis.find(x => x.id === el.dataset.kpiSave);
        const type = getKpiValueType(k);
        if (type === 'text') {
          const actual = (document.getElementById('kpi-edit-input')?.value ?? '').trim();
          const rateVal = (document.getElementById('kpi-edit-progress')?.value ?? '').trim();
          const progressRate = rateVal === '' ? null : parseFloat(rateVal);
          k.actual = actual;
          k.progressRate = progressRate != null && !isNaN(progressRate) ? progressRate : null;
          k.updatedAt = today();
          saveData();
        } else {
          const v = parseFloat(document.getElementById('kpi-edit-input')?.value);
          if (!isNaN(v)) { k.actual = v; k.updatedAt = today(); saveData(); }
        }
        ui.kpiEditId = null; requestRender();
        return;
      }
      if (el.hasAttribute('data-kpi-cancel')) { ui.kpiEditId = null; requestRender(); return; }

      if (el.dataset.krEdit) {
        const [okrId, krId] = el.dataset.krEdit.split(':');
        const o = data.okrs.find(x => x.id === okrId);
        const kr = o.keyResults.find(x => x.id === krId);
        ui.krEdit = {
          okrId, krId,
          achievementRate: String(calcKrProgress(kr)),
          progressNote: kr.progressNote ?? '',
        };
        requestRender();
        setTimeout(() => document.getElementById('kr-edit-rate')?.focus(), 0);
        return;
      }
      if (el.dataset.krSave) {
        const [okrId, krId] = el.dataset.krSave.split(':');
        const o = data.okrs.find(x => x.id === okrId);
        const kr = o.keyResults.find(x => x.id === krId);
        const rate = parseFloat(document.getElementById('kr-edit-rate')?.value);
        const progressNote = (document.getElementById('kr-edit-note')?.value ?? '').trim();
        if (!isNaN(rate)) {
          kr.target = KR_TARGET_PERCENT;
          kr.unit = '%';
          kr.actual = rate;
          kr.progressRate = null;
          kr.progressNote = progressNote;
          o.updatedAt = today();
          saveData();
        }
        ui.krEdit = null; requestRender();
        return;
      }
      if (el.hasAttribute('data-kr-cancel')) { ui.krEdit = null; requestRender(); return; }

      if (el.dataset.okrProgressEdit) {
        const o = data.okrs.find(x => x.id === el.dataset.okrProgressEdit);
        ui.okrProgressEdit = {
          okrId: o.id,
          progressRate: o.progressRate != null ? String(o.progressRate) : '',
          progressNote: o.progressNote ?? '',
        };
        requestRender();
        return;
      }
      if (el.dataset.okrProgressSave) {
        const o = data.okrs.find(x => x.id === el.dataset.okrProgressSave);
        const rateVal = document.getElementById('okr-progress-rate')?.value ?? '';
        const progressRate = rateVal.trim() === '' ? null : parseFloat(rateVal);
        const progressNote = (document.getElementById('okr-progress-note')?.value ?? '').trim();
        o.progressRate = progressRate != null && !isNaN(progressRate) ? progressRate : null;
        o.progressNote = progressNote;
        o.updatedAt = today();
        saveData();
        ui.okrProgressEdit = null; requestRender();
        return;
      }
      if (el.hasAttribute('data-okr-progress-cancel')) { ui.okrProgressEdit = null; requestRender(); return; }

      if (el.dataset.inputMode) {
        ui.inputMode = el.dataset.inputMode;
        requestRender({ nav: true });
        return;
      }
      if (el.hasAttribute('data-kpi-reset')) { ui.editingKpiId = null; ui.kpiForm = null; requestRender(); return; }
      if (el.dataset.loadKpi) {
        const k = data.kpis.find(x => x.id === el.dataset.loadKpi);
        ui.inputMode = 'kpi'; ui.editingKpiId = k.id;
        ui.kpiForm = { departmentId: k.departmentId, name: k.name, description: k.description, valueType: getKpiValueType(k), target: String(k.target), actual: String(k.actual), unit: k.unit, progressRate: k.progressRate != null ? String(k.progressRate) : '', weight: String(k.weight), owner: k.owner, status: k.status };
        requestRender({ nav: true });
        return;
      }
      if (el.dataset.delKpi) {
        if (confirm('이 KPI를 삭제하시겠습니까?')) { data.kpis = data.kpis.filter(x => x.id !== el.dataset.delKpi); saveData(); requestRender(); }
        return;
      }
      if (el.dataset.loadOkr) {
        const o = data.okrs.find(x => x.id === el.dataset.loadOkr);
        ui.inputMode = 'okr'; ui.editingOkrId = o.id;
        ui.okrMeta = { departmentId: o.departmentId, quarter: o.quarter, owner: o.owner };
        ui.objectiveDrafts = [{
          id: o.id, objective: o.objective,
          progressNote: o.progressNote ?? '',
          progressRate: o.progressRate != null ? String(o.progressRate) : '',
          keyResults: o.keyResults.map(krToDraft),
        }];
        requestRender({ nav: true });
        return;
      }
      if (el.dataset.delOkr) {
        if (confirm('이 OKR을 삭제하시겠습니까?')) { data.okrs = data.okrs.filter(x => x.id !== el.dataset.delOkr); saveData(); requestRender(); }
        return;
      }
      if (el.hasAttribute('data-okr-reset')) { resetOkrForm(); requestRender(); return; }

      if (el.hasAttribute('data-add-objective')) {
        collectObjectiveDrafts(); collectOkrMeta();
        ui.objectiveDrafts.push(newObjectiveDraft());
        requestRender();
        return;
      }
      if (el.dataset.removeObjective) {
        if (ui.objectiveDrafts.length <= 1) return;
        collectObjectiveDrafts(); collectOkrMeta();
        ui.objectiveDrafts = ui.objectiveDrafts.filter(o => o.id !== el.dataset.removeObjective);
        requestRender();
        return;
      }
      if (el.dataset.addKr) {
        collectObjectiveDrafts(); collectOkrMeta();
        const objId = el.dataset.addKr;
        ui.objectiveDrafts = ui.objectiveDrafts.map(o => o.id === objId ? { ...o, keyResults: [...o.keyResults, newKr()] } : o);
        requestRender();
        return;
      }
      if (el.dataset.removeKr) {
        const [objId, krId] = el.dataset.removeKr.split(':');
        collectObjectiveDrafts(); collectOkrMeta();
        ui.objectiveDrafts = ui.objectiveDrafts.map(o => {
          if (o.id !== objId || o.keyResults.length <= 1) return o;
          return { ...o, keyResults: o.keyResults.filter(kr => kr.id !== krId) };
        });
        requestRender();
      }
    });

    app.addEventListener('change', (e) => {
      if (e.target.id === 'quarter-select') {
        ui.quarter = e.target.value;
        requestRender({ nav: true });
        return;
      }
      if (e.target.name === 'valueType' && e.target.closest('#kpi-form')) {
        ui.kpiForm = readKpiFormFromDom();
        requestRender();
      }
    });

    app.addEventListener('submit', (e) => {
      if (e.target.id === 'kpi-form') handleKpiSubmit(e);
      else if (e.target.id === 'okr-form') handleOkrSubmit(e);
    });
  }

  initEvents();
  initAuth().catch(err => {
    console.error(err);
    authView = 'login';
    authMsg = { type: 'error', text: '초기화 실패: ' + (err.message || err) };
    renderAuthScreen();
  });
})();
  </script>
</body>
</html>
